<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デジタル名刺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ai-deep:#16283C;
    --ai:#213F5E;
    --ai-light:#3A5A7C;
    --kinari:#F6F0E3;
    --kinari-soft:#EFE7D6;
    --sango:#E4694F;
    --beni:#C1392B;
    --sumi:#2A2621;
    --sumi-soft:#5C564C;
    --line:rgba(42,38,33,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at 50% -10%, var(--ai-light) 0%, var(--ai) 45%, var(--ai-deep) 100%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    padding:40px 16px;
  }

  .card{
    width:100%;
    max-width:380px;
    background:var(--kinari);
    border-radius:2px;
    position:relative;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    overflow:hidden;
  }

  /* ---- ヘッダー領域（画像が収まるよう高さを調整） ---- */
  .header{
    position:relative;
    height:210px;
    background:linear-gradient(180deg, var(--ai-deep) 0%, var(--ai) 65%, var(--ai-light) 100%);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .header svg.waves{
    position:absolute;
    bottom:-2px; left:0;
    width:100%; height:auto;
    z-index: 2;
  }
  .seigaiha{
    position:absolute;
    inset:0;
    opacity:0.16;
    background-image:radial-gradient(circle at 50% 100%, transparent 0 24%, rgba(255,255,255,0.5) 24% 26%, transparent 26%);
    background-size:44px 44px;
    background-position: 0 0, 22px 22px;
    z-index: 1;
  }

  /* ---- 判子アバター（ヘッダー中央に配置） ---- */
  .avatar-wrap{
    position:relative;
    width:112px; height:112px;
    z-index:3;
    margin-top: -10px; /* 波とのバランス調整 */
  }
  .avatar-ring{
    width:100%; height:100%;
    border-radius:50%;
    background:var(--kinari);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
  }
  .hanko{
    width:94px;height:94px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;

    overflow:hidden;
  }
  .hanko::after{
    content:"";
    position:absolute;
    inset:6px;
    border-radius:50%;
    opacity:0.6;
    pointer-events: none;
    z-index: 2;
  }

  /* アバター画像スタイル */
  .avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    z-index: 1;
  }

  /* ---- 本文（上部の余白を調整） ---- */
  .body{
    padding:32px 28px 28px;
    text-align:center;
  }
  .name-en{
    font-size:11px;
    letter-spacing:0.28em;
    color:var(--sumi-soft);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .name-jp{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:30px;
    color:var(--sumi);
    margin:0;
    letter-spacing:0.06em;
  }
  .role{
    margin:10px 0 0;
    font-size:13.5px;
    color:var(--ai);
    font-weight:500;
    letter-spacing:0.03em;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:22px 0;
    color:var(--sango);
  }
  .divider .line{flex:1;height:1px;background:var(--line);}
  .divider svg{width:16px;height:16px;flex-shrink:0;}

  .catch{
    font-family:'Shippori Mincho', serif;
    font-size:15.5px;
    line-height:1.9;
    color:var(--sumi);
    margin:0 6px;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:20px;
  }
  .tag{
    font-size:11.5px;
    padding:6px 12px;
    border-radius:100px;
    background:var(--kinari-soft);
    border:1px solid var(--line);
    color:var(--ai);
    font-weight:500;
  }

  .links{
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .link{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    text-decoration:none;
    color:var(--sumi);
    font-size:13.5px;
    font-weight:500;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .link:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(33,63,94,0.12);
  }
  .link .icon{
    width:32px;height:32px;
    border-radius:50%;
    background:var(--ai-deep);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .link .icon svg{width:16px;height:16px;stroke:var(--kinari);fill:none;}
  .link .label{flex:1;}
  .link .handle{color:var(--sumi-soft);font-size:11.5px;}

  .footer{
    margin-top:26px;
    padding-top:18px;
    border-top:1px dashed var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .footer .note{
    font-size:10.5px;
    color:var(--sumi-soft);
    letter-spacing:0.04em;
  }
  .footer .stamp-text{
    font-family:'Shippori Mincho', serif;
    font-size:11px;
    color:var(--beni);
    border:1px solid var(--beni);
    padding:3px 8px;
    border-radius:4px;
  }

  @media (prefers-reduced-motion: no-preference){
    .avatar-img {
      animation: wag 3.2s ease-in-out infinite;
      transform-origin: center center;
    }
  }
  @keyframes wag{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(-4deg);}
  }
</style>
</head>

<div class="card">

  <div class="header">
    <div class="seigaiha"></div>
    
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="hanko">
          <!-- プロフィール画像 -->
          <img class="avatar-img" src="img/Harrypotter.jpeg" alt="プロフィール画像">
        </div>
      </div>
    </div>

    <svg class="waves" viewBox="0 0 380 60" preserveAspectRatio="none">
      <path d="M0,30 C40,10 80,50 120,30 C160,10 200,50 240,30 C280,10 320,50 360,30 L380,30 L380,60 L0,60 Z" fill="#F6F0E3" opacity="1"></path>
    </svg>
  </div>

  <div class="body">
    <p class="name-en">Samechi Dayo</p>
    <h1 class="name-jp">さめち だよ</h1>
    <p class="role">LiversStaff ・ SE</p>

    <div class="divider">
      <span class="line"></span>
      <!-- <svg viewBox="0 0 24 24"><path d="M2,16 Q6,10 12,16 T22,16" stroke="#E4694F" stroke-width="2" fill="none" stroke-linecap="round"/></svg> -->
      <span class="line"></span>
    </div>

    <p class="catch">"あざらしのように、<br>まるく、おだやかに。"</p>

    <div class="tags">
      <span class="tag">#読書</span>
      <span class="tag">#映画鑑賞</span>
      <span class="tag">#和菓子好き</span>
      <span class="tag">#SE</span>
      <span class="tag">#Python3</span>
      <span class="tag">#Java</span>
      <span class="tag">#鮫より海豹の方が好き</span>
      <span class="tag">#スプラ3</span>
      <span class="tag">#COO</span>
      <span class="tag">#Staff</span>
      <span class="tag">#普通救命1 受講済み</span>
      <span class="tag">#iPad</span>
      <span class="tag">#MacBook</span>
    </div>

    <div class="links">
      <a class="link" href="https://www.instagram.com/SAMECHI_DAYO/" onclick="return true;">
        <span class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1" fill="#F6F0E3" stroke="none"/></svg></span>
        <span class="label">Instagram<br><span class="handle">@SAMECHI_DAYO</span></span>
      </a>
      <a class="link" href="https://github.com/samechi" onclick="return true;">

      </a>
      <a class="link" href="https://samechi.github.io/portfolio/" onclick="return true;">
        <span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="2"/><path d="M3 12h18M12 3c2.5 2.5 3.5 5.5 3.5 9s-1 6.5-3.5 9c-2.5-2.5-3.5-5.5-3.5-9s1-6.5 3.5-9Z" stroke-width="1.6"/></svg></span>
        <span class="label">portfolio<br><span class="handle">samechi.github.io/portfolio</span></span>
      </a>
    </div>

    <div class="footer">
      <span class="note">© 2026 Samechi Dayo</span>
      <span class="stamp-text">名刺</span>
    </div>

  </div>
</div>
</body>
</html>
